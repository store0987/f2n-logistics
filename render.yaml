services:
  - type: web
    name: logistics-app-service
    env: docker
    plan: starter
    region: fra
    dockerfilePath: Dockerfile
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "10000"
      - key: DB_PATH
        value: /app/backend/data/logistics.db
    mounts:
      - name: logistics-db
        path: /app/backend/data
disks:
  - name: logistics-db
    sizeGB: 1
  